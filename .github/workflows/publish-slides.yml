name: Publish slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Quarto/**'
      - 'Figures/**'
      - '.github/workflows/publish-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::ggplot2
            any::dplyr
            any::tidyr

      - name: Render Quarto deck
        working-directory: Quarto
        run: quarto render claude-mini.qmd

      - name: Render handouts
        run: |
          quarto render handouts/resources.md
          quarto render handouts/codex-setup.md

      - name: Stage site
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.claude' \
            --exclude='quality_reports' \
            ./ _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
